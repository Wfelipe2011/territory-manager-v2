services:
  db:
    cpus: '1'
    mem_limit: 2048m
    container_name: db_territory_manager_development
    image: postgres:16
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=territory_manager_production
    volumes:
      - './data:/docker-entrypoint-initdb.d:ro'
      - 'pgdata_dev:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d territory_manager_production']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer_territory_manager_development
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=territory_manager_production
      - POOL_MODE=session
      - MAX_CLIENT_CONN=2000
      - DEFAULT_POOL_SIZE=80
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
      - AUTH_TYPE=scram-sha-256
    ports:
      - '5435:5432'
    depends_on:
      db:
        condition: service_healthy

  app:
    cpus: '1'
    mem_limit: 1024m
    build:
      context: .
      dockerfile: Dockerfile.development
    container_name: app_territory_manager_development
    environment:
      - PORT=${PORT}
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:5432/territory_manager_production?pgbouncer=true&connection_limit=10
      - DIRECT_URL=postgresql://postgres:postgres@db:5432/territory_manager_production
      - JWT_SECRET=${JWT_SECRET}
      - INSTANCE_ID
      - TZ=America/Sao_Paulo
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    command: sh -c "npx prisma migrate dev && npm run start:dev"

volumes:
  pgdata_dev:
    driver: local
