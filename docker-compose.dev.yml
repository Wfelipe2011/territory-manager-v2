services:
  db:
    cpus: '1'
    mem_limit: 2048m
    container_name: db_territory_manager_development
    image: postgres:16
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=territory_manager_production
    volumes:
      - './data:/docker-entrypoint-initdb.d:ro'

  app:
    cpus: '1'
    mem_limit: 1024m
    build:
      context: .
      dockerfile: Dockerfile.development
    container_name: app_territory_manager_development
    environment:
      - PORT=${PORT}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/territory_manager_production
      - JWT_SECRET=${JWT_SECRET}
      - INSTANCE_ID
      - TZ=America/Sao_Paulo
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - db
